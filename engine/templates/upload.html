<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #d2ebfe, #ffffff);
            min-height: 100vh;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/upload/">🚀 AI Resume Analyzer</a>
        <div class="d-flex">
            <a class="btn btn-outline-light me-2" href="/upload/">Upload Resume</a>
            <a class="btn btn-outline-light me-2" href="/history/">History</a>
            <a class="btn btn-danger" href="/logout/">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5" style="max-width: 700px;">
    <h1 class="text-center mb-4">AI Resume Analyzer</h1>
    <div class="card p-4 shadow text-dark">
        <form method="POST" enctype="multipart/form-data" onsubmit="return validateAndSubmit(this)">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Branch</label>
                <input type="text" name="branch" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">CGPA</label>
                <input type="text" name="cgpa" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Upload Resume (PDF/DOCX)</label>
                <input type="file" name="resume" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Job Description</label>
                <textarea name="job_description" class="form-control" rows="5"
                          placeholder="Paste job description here for job match analysis"></textarea>
            </div>

            <div id="loadingText" class="text-info mb-3" style="display:none; font-weight:bold;">
                ⏳ Processing your resume with AI... Please wait...
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary w-100">
                Analyze Resume
            </button>
        </form>
    </div>
</div>

<script>
function validateAndSubmit(form) {
    let fileInput = form.querySelector('input[type="file"]');
    let file = fileInput.files[0];

    if (!file) {
        alert("Please select a file!");
        return false;
    }

    let fileName = file.name.toLowerCase();

    if (!(fileName.endsWith(".pdf") || fileName.endsWith(".docx"))) {
        alert("Only PDF or DOCX files allowed!");
        return false;
    }

    document.getElementById("loadingText").style.display = "block";
    let btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerText = "Processing...";

    return true;
}
</script>

</body>
</html>
