<!DOCTYPE html>
<html>

<head>

<title>AI Resume Analyzer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
        body {
            background: linear-gradient(to right, #d2ebfe, #ffffff);
            min-height: 100vh;
        }
        .custom-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            height: 100%;
        }
    </style>

</head>

<body>

<div class="container mt-5">

<h1 class="text-center mb-4">AI Resume Analyzer</h1>

<div class="card p-4 shadow">

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Branch</label>
<input type="text" name="branch" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">CGPA</label>
<input type="text" name="cgpa" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Upload Resume (PDF)</label>
<input type="file" name="resume" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Job Description</label>
<textarea name="job_description" class="form-control" rows="5"
placeholder="Paste job description here for job match analysis"></textarea>
</div>

<button type="submit" class="btn btn-primary w-100" onclick="handleFormSubmit()">
    Analyze Resume
</button>

</form>

</div>

<div class="text-center mt-3">

<a href="/history/" class="btn btn-outline-dark">
View Resume History
</a>

</div>

</div>

<script>

function showFileName(input){
    if(input.files.length > 0){
        document.getElementById("fileName").innerText =
            "Selected file: " + input.files[0].name;
    }
}

function validateAndSubmit(form){
    let fileInput = form.querySelector('input[type="file"]');
    let file = fileInput.files[0];

    // check file selected
    if(!file){
        alert("Please select a file!");
        return false;
    }

    let fileName = file.name.toLowerCase();

    // check extension
    if(!(fileName.endsWith(".pdf") || fileName.endsWith(".docx"))){
        alert("Only PDF or DOCX files allowed!");
        return false;
    }

    // show loading text
    document.getElementById("loadingText").style.display = "block";

    // disable button
    let btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerText = "Processing...";

    return true;
}

</script>

</body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="/">AI Resume Analyzer</a>

<div>

<a class="btn btn-outline-light me-2" href="/">Upload Resume</a>

<a class="btn btn-outline-light me-2" href="/history/">History</a>


</div>

</div>
</nav>

</html>
