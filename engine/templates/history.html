<!DOCTYPE html>
<html>

<head>

<title>Resume History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">Resume Analysis History</h2>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Branch</th>
<th>CGPA</th>

</tr>

</thead>

<tbody>

{% for p in profiles %}

<tr>

<td>{{ p.id }}</td>
<td>{{ p.name }}</td>
<td>{{ p.email }}</td>
<td>{{ p.branch }}</td>
<td>{{ p.cgpa }}</td>

</tr>

{% endfor %}

</tbody>

</table>

<a href="/" class="btn btn-primary">Upload New Resume</a>

</div>

</body>

</html>
